<!DOCTYPE html>
<html>
<head>
    
</head>
<body>

<form action="test.py" method="POST">

    <input type="hidden" name="form_id" value="12345">

    <label for="username">Username</label><br>
    <input type="text" 
           id="username" 
           name="username" 
           placeholder="Enter a unique username (Required)"
           required>
    <hr>

    <label for="password">Password</label><br>
    <input type="password" 
           id="password" 
           name="password" 
           placeholder="Choose a strong password with letters & numbers">
    <hr>

    <label for="mobile">Mobile</label><br>
    <input type="tel" 
           id="mobile" 
           name="mobile"
           placeholder="Example: +20100 (234) 123"
           pattern="^\+20100\s?\(\d{3}\)\s?\d{3}$">
    <hr>

    <label for="email">Email</label><br>
    <input type="email" 
           id="email" 
           name="email"
           placeholder="Enter a valid email address (Required)"
           required>
    <hr>

    <label for="subject">Subject</label><br>
    <input type="text" 
           id="subject" 
           name="subject"
           placeholder="Write the subject of your message here">
    <hr>

    <button type="reset">Empty Form</button>
    <button type="submit">Send Data</button>

</form>

</body>
</html>
